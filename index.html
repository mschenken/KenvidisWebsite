<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenvidis — Bringing AI into your business</title>
  <meta name="description" content="Kenvidis helps companies integrate artificial intelligence into the way they work." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAF8F3;
      --fg: #1F2421;
      --logo: #1A3B3A;
      --fg-muted: #1A3B3A;
      --accent: #5BA8B8;
      --border: rgba(26, 59, 58, 0.15);
      --serif: 'Fraunces', 'Cormorant Garamond', 'Playfair Display', Georgia, 'Times New Roman', serif;
      --mono: 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--serif);
      font-weight: 300;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Radial glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 120vw;
      height: 80vh;
      background: radial-gradient(ellipse at center, rgba(91, 168, 184, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    header, main, footer {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1100px;
      margin: 0 auto;
      padding-left: 3rem;
      padding-right: 3rem;
    }

    header {
      padding-top: 2rem;
      padding-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      animation: fadeDown 1s ease-out both;
    }

    .mark, .status, .eyebrow, .contact-label, footer {
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg-muted);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 4rem;
      padding-bottom: 4rem;
    }

    .eyebrow {
      color: var(--accent);
      margin-bottom: 2rem;
      animation: fadeUp 1s ease-out 0.2s both;
    }

    h1 {
      font-family: var(--serif);
      font-weight: 300;
      color: var(--logo);
      font-size: clamp(2.75rem, 8vw, 6.5rem);
      line-height: 1.02;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
      max-width: 14ch;
      animation: fadeUp 1.2s ease-out 0.4s both;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 400;
    }

    .lede {
      font-size: clamp(1.05rem, 1.4vw, 1.25rem);
      line-height: 1.6;
      max-width: 52ch;
      color: var(--fg);
      margin-bottom: 3rem;
      font-weight: 300;
      animation: fadeUp 1s ease-out 0.6s both;
    }

    .divider {
      display: block;
      width: 60px;
      height: 1px;
      background: var(--accent);
      border: none;
      margin: 3rem 0;
      animation: widen 1s ease-out 0.8s both;
    }

    .contact {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      animation: fadeUp 1s ease-out 1s both;
    }

    .contact a {
      color: var(--fg);
      text-decoration: none;
      font-size: clamp(1.25rem, 2vw, 1.75rem);
      font-family: var(--serif);
      font-style: italic;
      font-weight: 300;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease, color 0.3s ease;
      width: fit-content;
      padding-bottom: 2px;
    }

    .contact a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    footer {
      padding-top: 2rem;
      padding-bottom: 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      animation: fadeUp 1s ease-out 1.2s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes widen {
      from { width: 0; }
      to { width: 60px; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    @media (max-width: 640px) {
      header, main, footer {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
      footer {
        flex-direction: column;
        gap: 0.5rem;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="mark">Kenvidis</div>
    <div class="status">Est. 2025</div>
  </header>

  <main>
    <h1>Bringing <em>AI</em> into your business.</h1>
    <p class="lede">
      Kenvidis helps companies integrate artificial intelligence into the way they work — practically, thoughtfully, and built to last.
    </p>
    <hr class="divider" />
    <div class="contact">
      <span class="contact-label">Get in touch</span>
      <a href="mailto:michael@kenvidis.com">michael@kenvidis.com</a>
    </div>
  </main>

  <footer>
    <span>© 2026 Kenvidis</span>
    <span>kenvidis.com</span>
  </footer>
</body>
</html>
